<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculateur STC — Congés payés Suisse</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 2rem 1rem; }
.wrap { max-width: 860px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
.sec { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 8px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
input[type=date], input[type=number] { width: 100%; padding: 8px 10px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; font-size: 14px; background: #fff; color: #1a1a1a; }
input:focus { outline: none; box-shadow: 0 0 0 2px rgba(0,0,0,0.15); }
textarea { width: 100%; height: 150px; resize: vertical; font-family: 'Menlo','Consolas',monospace; font-size: 13px; padding: 8px 10px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; background: #fff; color: #1a1a1a; }
.paliers-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
.palier-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: end; }
.btn-add { font-size: 13px; cursor: pointer; padding: 6px 12px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; background: #fff; color: #1a1a1a; margin-bottom: 1.25rem; display: block; }
.btn-add:hover { background: #f5f5f0; }
.btn-calc { width: 100%; padding: 11px; font-size: 15px; cursor: pointer; border: 0.5px solid rgba(0,0,0,0.25); border-radius: 8px; background: #1a1a1a; color: #fff; margin-bottom: 1.5rem; display: block; }
.btn-calc:hover { background: #333; }
.btn-del { background: none; border: none; color: #c0392b; cursor: pointer; font-size: 18px; padding: 0 4px; line-height: 1; }
.tbl-wrap { overflow-x: auto; margin-bottom: 1.25rem; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; padding: 6px 8px; border-bottom: 0.5px solid rgba(0,0,0,0.12); text-align: right; background: #fafaf8; }
th:first-child { text-align: left; }
td { padding: 8px; border-bottom: 0.5px solid rgba(0,0,0,0.08); text-align: right; vertical-align: top; }
td:first-child { text-align: left; font-weight: 500; }
tr:last-child td { border-bottom: none; }
.sub { font-size: 11px; color: #aaa; display: block; margin-top: 2px; font-weight: 400; }
.ok { color: #1d9e75; font-weight: 500; }
.warn { color: #ba7517; font-weight: 500; }
.danger { color: #c0392b; font-weight: 500; }
.metrics { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 1.25rem; }
.metric { background: #f5f5f0; border-radius: 8px; padding: 1rem; }
.metric-label { font-size: 12px; color: #888; margin: 0 0 4px; }
.metric-val { font-size: 22px; font-weight: 500; margin: 0; }
.err { background: #fdf0f0; color: #c0392b; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 1rem; }
.info { background: #f5f5f0; color: #666; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 1rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Calculateur STC — Congés payés Suisse</h1>

  <p class="sec">Contrat</p>
  <div class="row2">
    <div><label for="entree">Date d'entrée</label><input type="date" id="entree"></div>
    <div><label for="sortie">Date de sortie</label><input type="date" id="sortie"></div>
  </div>

  <p class="sec">Paliers CP (jours / an)</p>
  <div class="paliers-list" id="paliers"></div>
  <button class="btn-add" id="btnAdd" type="button">+ Ajouter un palier</button>

  <p class="sec">Export absences</p>
  <div style="margin-bottom:1.25rem">
    <textarea id="absences" placeholder="3 jours (Maladie)
Mars 2026
2 jours (CP25)
Mars 2026
..."></textarea>
  </div>

  <button class="btn-calc" id="btnCalc" type="button">Calculer le STC</button>

  <div id="result"></div>
</div>
<script src="stc_cp_suisse.js"></script>
</body>
</html>
